# ==============================================================================
# MAHEFOOZ1710 — Dolphin Emulator Full Build + Google Drive Auto-Upload
# Hardware : Dell Optiplex 7050 SFF | i3-6100 (Skylake) | 8GB DDR4
# OS Target: Ubuntu 22.04 LTS
# Controller: Cosmic Byte Stelleris (SDL2 Rumble + ff-memless)
#
# FIXES APPLIED:
# [C1] i965-va-driver → intel-media-va-driver (correct Gen9 driver)
# [C2] qt6-wayland    → qt6-qpa-plugins (correct package naam)
# [C3] rclone base64  → printf pipe (multiline secret safe)
# [M1] LTO OOM        → gold linker added (GCC LTO compatible)
# [M2] fetch-depth: 1 → fetch-depth: 0 (submodule shallow clone fix)
# [M3] gdrive: remote → auto-detect from rclone.conf
# [L1] libpugixml-dev → removed (Dolphin bundles its own)
# [F1] USE_X11/USE_WAYLAND → ENABLE_X11/ENABLE_WAYLAND (Dolphin's actual cmake vars)
# [F2] rclone test fail pe RCLONE_AVAILABLE false nahi hota tha → logic fix
# ==============================================================================

name: MAHEFOOZ1710 Dolphin Skylake + GDrive Upload

on:
  workflow_dispatch:

jobs:
  build-dolphin:
    name: Build Dolphin — Dell Optiplex 7050 i3-6100
    runs-on: ubuntu-22.04

    steps:

      # ────────────────────────────────────────────────────────
      # STEP 1: System check
      # ────────────────────────────────────────────────────────
      - name: System Reality Check
        run: |
          echo "=========================================="
          echo "  OS   : $(lsb_release -d | cut -f2)"
          echo "  Cores: $(nproc)"
          echo "  RAM  : $(free -h | awk '/^Mem/{print $2}')"
          echo "=========================================="

      # ────────────────────────────────────────────────────────
      # STEP 2: Checkout Dolphin source
      # fetch-depth: 0 → submodules bhi full clone hote hain
      # shallow clone se cmake configure fail ho sakta hai
      # ────────────────────────────────────────────────────────
      - name: Checkout Dolphin Source
        uses: actions/checkout@v4
        with:
          repository: 'dolphin-emu/dolphin'
          submodules: recursive
          fetch-depth: 0

      # ────────────────────────────────────────────────────────
      # STEP 3: Compiler tools
      # ────────────────────────────────────────────────────────
      - name: Install Compiler + Build Tools
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            gcc-12 g++-12 \
            cmake ninja-build \
            git build-essential pkg-config \
            binutils-gold
          # binutils-gold → /usr/bin/ld.gold (GNU gold linker)
          # GCC LTO plugin ke saath fully compatible hai
          # lld (LLVM) GCC ke LTO IR format nahi samajhta

      # ────────────────────────────────────────────────────────
      # STEP 4: All dependencies — alag steps taaki fail hone
      #         pe exact package pata chale
      # ────────────────────────────────────────────────────────
      - name: Install FFmpeg Libraries
        run: |
          sudo apt-get install -y \
            libavcodec-dev libavformat-dev libavutil-dev \
            libswscale-dev libswresample-dev

      - name: Install Controller + Input Libraries
        run: |
          sudo apt-get install -y \
            libsdl2-dev libsdl2-2.0-0 \
            libevdev-dev libudev-dev libhidapi-dev

      - name: Install Display Libraries
        run: |
          sudo apt-get install -y \
            libx11-dev libxext-dev libxrandr-dev \
            libxi-dev libx11-xcb-dev

      - name: Install Audio Libraries
        run: |
          sudo apt-get install -y \
            libasound2-dev libpulse-dev

      - name: Install Graphics Libraries
        run: |
          sudo apt-get install -y \
            libgl1-mesa-dev libvulkan-dev \
            libva-dev \
            intel-media-va-driver

      - name: Install Network + Compression Libraries
        run: |
          sudo apt-get install -y \
            libcurl4-openssl-dev libmbedtls-dev libminiupnpc-dev \
            libzstd-dev liblzo2-dev libbz2-dev

      - name: Install Misc Libraries
        run: |
          sudo apt-get install -y \
            libbluetooth-dev gettext

      - name: Install Qt6 GUI
        run: |
          sudo apt-get install -y \
            qt6-base-dev qt6-base-private-dev \
            libqt6svg6-dev \
            qt6-qpa-plugins

      # ────────────────────────────────────────────────────────
      # STEP 5: Rclone install (latest, not apt version)
      # ────────────────────────────────────────────────────────
      - name: Install Rclone
        run: |
          curl -fsSL https://rclone.org/install.sh | sudo bash
          echo "rclone: $(rclone --version | head -1)"

      # ────────────────────────────────────────────────────────
      # STEP 6: Setup rclone → Google Drive
      # FIX [F2]: rclone test fail hone par RCLONE_AVAILABLE false
      # ────────────────────────────────────────────────────────
      - name: Setup Rclone for Google Drive
        env:
          RCLONE_CONFIG_BASE64: ${{ secrets.RCLONE_CONFIG_BASE64 }}
        run: |
          if [ -z "$RCLONE_CONFIG_BASE64" ]; then
            echo "WARNING: RCLONE_CONFIG_BASE64 secret set nahi hai!"
            echo "RCLONE_AVAILABLE=false" >> $GITHUB_ENV
          else
            mkdir -p ~/.config/rclone
            printf '%s' "$RCLONE_CONFIG_BASE64" | base64 -d > ~/.config/rclone/rclone.conf
            REMOTE_NAME=$(rclone listremotes | head -1 | tr -d ':')
            echo "REMOTE_NAME=$REMOTE_NAME" >> $GITHUB_ENV

            # Connection test — agar fail hua to upload skip
            if rclone lsd "${REMOTE_NAME}:" --max-depth 1 2>/dev/null; then
              echo "Google Drive connection: OK (remote: ${REMOTE_NAME})"
              echo "RCLONE_AVAILABLE=true" >> $GITHUB_ENV
            else
              echo "WARNING: GDrive test failed - check rclone config"
              echo "RCLONE_AVAILABLE=false" >> $GITHUB_ENV
            fi
          fi

      # ────────────────────────────────────────────────────────
      # STEP 7: CMake Configure
      # FIX [F1]: ENABLE_X11/ENABLE_WAYLAND (Dolphin ke original flag)
      # ────────────────────────────────────────────────────────
      - name: Configure CMake (Skylake i3-6100 Optimized)
        run: |
          mkdir build && cd build

          OPT_FLAGS="-O3 -march=skylake -mtune=skylake -pipe -fno-plt"

          cmake .. \
            -GNinja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=gcc-12 \
            -DCMAKE_CXX_COMPILER=g++-12 \
            -DCMAKE_C_FLAGS="${OPT_FLAGS}" \
            -DCMAKE_CXX_FLAGS="${OPT_FLAGS}" \
            -DCMAKE_EXE_LINKER_FLAGS="-fuse-ld=gold" \
            -DCMAKE_SHARED_LINKER_FLAGS="-fuse-ld=gold" \
            -DCMAKE_INSTALL_PREFIX=/usr \
            -DENABLE_LTO=ON \
            -DENABLE_X11=ON \
            -DENABLE_WAYLAND=ON \
            -DENABLE_SDL=ON \
            2>&1 | tee /tmp/cmake-configure.log

          echo ""
          echo "CMake configure done."
          echo "  Compiler  : GCC 12"
          echo "  Linker    : gold (GNU linker, GCC LTO compatible)"
          echo "  Target    : Skylake i3-6100 (AVX2)"
          echo "  SDL2      : ON  (Cosmic Byte Stelleris + rumble)"
          echo "  LTO       : ON"
          echo "  Wayland   : ON | X11: ON"
          echo "  VA-API    : intel-media-va-driver (Intel HD 530 Gen9)"

      # ────────────────────────────────────────────────────────
      # STEP 8: Compile
      # ────────────────────────────────────────────────────────
      - name: Compile Dolphin
        run: |
          cd build
          echo "Build starting... cores: $(nproc)"
          ninja -j$(nproc)
          echo "Build complete!"

      # ────────────────────────────────────────────────────────
      # STEP 9: Package
      # ────────────────────────────────────────────────────────
      - name: Package Build
        run: |
          cd build
          DESTDIR=${{ github.workspace }}/dolphin-install ninja install
          cd ${{ github.workspace }}

          BUILD_DATE=$(date +%Y%m%d)
          TAR_NAME="dolphin-ubuntu22.04-skylake-i3-6100-${BUILD_DATE}.tar.gz"
          tar -czvf "$TAR_NAME" -C dolphin-install .

          echo ""
          echo "Package : $TAR_NAME"
          echo "Size    : $(du -sh "$TAR_NAME" | cut -f1)"
          echo "TAR_NAME=$TAR_NAME" >> $GITHUB_ENV

      # ────────────────────────────────────────────────────────
      # STEP 10: GitHub Artifacts backup (always runs)
      # ────────────────────────────────────────────────────────
      - name: Upload to GitHub Artifacts (Backup)
        uses: actions/upload-artifact@v4
        with:
          name: Dolphin-MAHEFOOZ1710-Skylake
          path: ${{ env.TAR_NAME }}
          retention-days: 30

      # ────────────────────────────────────────────────────────
      # STEP 11: Google Drive upload (only if rclone configured + test pass)
      # ────────────────────────────────────────────────────────
      - name: Upload to Google Drive
        if: env.RCLONE_AVAILABLE == 'true'
        run: |
          GDRIVE_FOLDER_ID="1H28ejDbHH8c_sRBq7tL4YxI6oOUmFgBr"

          echo "Uploading to Google Drive..."
          echo "  Remote : ${REMOTE_NAME}"
          echo "  Folder : $GDRIVE_FOLDER_ID"

          rclone copy "${{ env.TAR_NAME }}" \
            "${REMOTE_NAME}:" \
            --drive-root-folder-id "$GDRIVE_FOLDER_ID" \
            --progress \
            --stats 30s \
            --retries 3 \
            --retries-sleep 10s

          echo "Google Drive upload complete!"
          echo "  URL: https://drive.google.com/drive/folders/$GDRIVE_FOLDER_ID"

      - name: Skip GDrive (secret not configured or test failed)
        if: env.RCLONE_AVAILABLE == 'false'
        run: |
          echo "GDrive upload skipped - RCLONE_CONFIG_BASE64 secret nahi mila ya connection test fail."
          echo "Dolphin build GitHub Artifacts mein available hai (30 days)."

      # ────────────────────────────────────────────────────────
      # STEP 12: Build Summary
      # ────────────────────────────────────────────────────────
      - name: Build Summary
        run: |
          echo ""
          echo "╔══════════════════════════════════════════════════════════╗"
          echo "║         MAHEFOOZ1710 DOLPHIN BUILD COMPLETE              ║"
          echo "╠══════════════════════════════════════════════════════════╣"
          echo "║  Package  : ${{ env.TAR_NAME }}"
          echo "║  Compiler : GCC 12 (C++20) + gold linker"
          echo "║  Target   : Skylake i3-6100 (AVX2 + FMA)"
          echo "║  SDL2     : YES — Cosmic Byte Stelleris + Vibration"
          echo "║  VA-API   : YES — intel-media-va-driver (HD 530 Gen9)"
          echo "║  LTO      : YES — via gold (GCC LTO compatible)"
          echo "╠══════════════════════════════════════════════════════════╣"
          echo "║  INSTALL karne ke baad:                                  ║"
          echo "║  1. tar -xzf <file.tar.gz> -C /                         ║"
          echo "║  2. sudo ldconfig                                        ║"
          echo "║  3. dolphin-emu                                          ║"
          echo "║                                                          ║"
          echo "║  CONTROLLER (Cosmic Byte Stelleris):                    ║"
          echo "║  • Dolphin → Controllers → Port 1 → SDL/evdev           ║"
          echo "║  • Vibration: Settings → Controller → Rumble ON         ║"
          echo "║  • ff-memless auto-loads Ubuntu 22.04 pe                ║"
          echo "╚══════════════════════════════════════════════════════════╝"