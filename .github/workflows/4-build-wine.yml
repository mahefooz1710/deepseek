name: "04 | BUILD WINE-TKG (Gaming + FSR + Esync)"

on:
  workflow_dispatch:

jobs:
  build-wine:
    runs-on: ubuntu-22.04
    steps:

      - name: Register i386 Architecture
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update -y
          echo "i386 registered: $(dpkg --print-foreign-architectures)"

      - name: Install 64-bit Build Tools
        run: |
          sudo apt-get install -y \
            git wget autoconf automake libtool \
            bison flex \
            gcc g++ \
            gcc-multilib g++-multilib \
            mingw-w64 \
            python3 python3-pip \
            pkg-config \
            make cmake \
            nasm yasm

      - name: Install 64-bit Libraries
        run: |
          sudo apt-get install -y \
            libasound2-dev \
            libpulse-dev \
            libdbus-1-dev \
            libfontconfig-dev \
            libfreetype-dev \
            libgnutls28-dev \
            libgl-dev \
            libsdl2-dev \
            libvulkan-dev \
            libxcomposite-dev \
            libxcursor-dev \
            libxfixes-dev \
            libxi-dev \
            libxrandr-dev \
            libxrender-dev \
            libxxf86vm-dev \
            libosmesa6-dev \
            libxkbcommon-dev

      - name: Install 32-bit (i386) Libraries
        run: |
          sudo apt-get install -y \
            libasound2-dev:i386 \
            libpulse-dev:i386 \
            libdbus-1-dev:i386 \
            libfontconfig-dev:i386 \
            libfreetype-dev:i386 \
            libgnutls28-dev:i386 \
            libgl-dev:i386 \
            libsdl2-dev:i386 \
            libvulkan-dev:i386 \
            libxcomposite-dev:i386 \
            libxcursor-dev:i386 \
            libxfixes-dev:i386 \
            libxi-dev:i386 \
            libxrandr-dev:i386 \
            libxrender-dev:i386 \
            libxxf86vm-dev:i386

      - name: Set i386 pkg-config Paths
        run: |
          echo "PKG_CONFIG_PATH_32=/usr/lib/i386-linux-gnu/pkgconfig:/usr/share/pkgconfig" >> $GITHUB_ENV
          echo "PKG_CONFIG_LIBDIR_32=/usr/lib/i386-linux-gnu/pkgconfig" >> $GITHUB_ENV
          echo "=== 32-bit library verification ==="
          ls /usr/lib/i386-linux-gnu/libasound* 2>/dev/null && echo "ALSA i386 OK" || echo "ALSA i386 MISSING"
          ls /usr/lib/i386-linux-gnu/libpulse.so* 2>/dev/null && echo "Pulse i386 OK" || echo "Pulse i386 MISSING"
          ls /usr/lib/i386-linux-gnu/libvulkan.so* 2>/dev/null && echo "Vulkan i386 OK" || echo "Vulkan i386 MISSING"

      - name: Clone Wine-TKG (with submodule fallback)
        run: |
          echo "Cloning main repo..."
          git clone --recurse-submodules \
            https://github.com/Frogging-Family/wine-tkg-git.git
          cd wine-tkg-git

          # Ensure submodule is really there
          if [ ! -f wine-tkg-git/nonpacman-build.sh ]; then
            echo "Submodule missing! Cloning it manually..."
            rm -rf wine-tkg-git
            git clone https://github.com/Frogging-Family/wine-tkg-git.git wine-tkg-git
          else
            echo "Submodule already present."
          fi

          cd ..
          echo "=== inner dir verify ==="
          ls wine-tkg-git/wine-tkg-git/

      - name: Configure Wine-TKG for Gaming
        run: |
          cd wine-tkg-git/wine-tkg-git
          sed -i 's/_proton_fsr="false"/_proton_fsr="true"/' customization.cfg || true
          sed -i 's/_use_esync="false"/_use_esync="true"/' customization.cfg || true
          sed -i 's/_use_fsync="false"/_use_fsync="true"/' customization.cfg || true
          sed -i 's/_dxvk_dxgi="false"/_dxvk_dxgi="true"/' customization.cfg || true
          sed -i 's/_proton_mf_hacks="false"/_proton_mf_hacks="true"/' customization.cfg || true
          echo "=== Active customization.cfg settings ==="
          grep -E "_proton_fsr|_use_esync|_use_fsync|_dxvk_dxgi" customization.cfg

      - name: Compile Wine-TKG
        run: |
          cd wine-tkg-git/wine-tkg-git
          # Ensure script is executable (fallback clone might not preserve permissions)
          chmod +x ./nonpacman-build.sh
          export PKG_CONFIG_PATH_32="$PKG_CONFIG_PATH_32"
          export PKG_CONFIG_LIBDIR_32="$PKG_CONFIG_LIBDIR_32"
          yes "" | ./nonpacman-build.sh || true
          echo "=== Build output check ==="
          find . -name "wine" -o -name "wine64" 2>/dev/null | head -5
          find . -name "*.tar.*" 2>/dev/null | head -5

      - name: Package Wine-TKG
        run: |
          mkdir -p /tmp/wine-mahefooz
          cp -r wine-tkg-git/wine-tkg-git/nonpacman-builds/* \
            /tmp/wine-mahefooz/ 2>/dev/null || true
          find wine-tkg-git -name "wine-tkg-*" -type d \
            -exec cp -r {} /tmp/wine-mahefooz/ \; 2>/dev/null || true
          echo "=== Wine package contents ==="
          ls -lh /tmp/wine-mahefooz/ || echo "Empty - check build logs above"
          cd /tmp
          tar -czvf wine-tkg-custom.tar.gz wine-mahefooz/
          du -sh wine-tkg-custom.tar.gz

      - name: Upload Wine Artifact
        uses: actions/upload-artifact@v4
        with:
          name: wine-tkg-custom
          path: /tmp/wine-tkg-custom.tar.gz
          retention-days: 3
